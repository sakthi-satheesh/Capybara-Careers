<!DOCTYPE html>

<html>
<head>
    <meta charset="utf-8" />
    <title>Forgot Password</title>
    <link rel="stylesheet" href="forgotPassword.css">

    <script type="text/javascript"
            src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js">
    </script>
    <script type="text/javascript">
        (function(){
           emailjs.init({
             publicKey: "ZMmSXMYbGn0AU8DGP",
           });
        })();
    </script>

    <script src="forgotPassword.js" defer></script>

</head>
<body>

<div class="desktop-login" >

    <div class="forgotPassword" >Forgot Password</div>

    <div class="box" >
        <div class="emailBox" >
            <input type="email" id="email" class="rectangle" placeholder="Email"/>
        </div>

        <button type="button" id="sendCode" class="sendButton">Send Code</button>

        <div class="codeBox" >
            <input type="text" id="code" class="rectangle" placeholder="6 Digit Code"/>
        </div>

        <button type="button" class="button">
            <a id="submitButton" class="submit">Submit</a>
        </button>

    </div>

    <a href="javascript:history.back()" class="backButton" >&lt;-</a>

</div>

</body>
</html>
