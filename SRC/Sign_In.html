<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <meta charset="utf-8" />
    <title>Sign In</title>

    <link rel="stylesheet" href="Sign_In.css">
    <script src="Sign_In.js" defer></script>
</head>
<body>

<div class="desktop-login">

    <div class="log_in">Log In</div>

    <!-- EMAIL -->
    <div class="emailBox">
        <input
            type="email"
            class="rectangle"
            placeholder="Email"
            id="email"
        />
    </div>

    <!-- PASSWORD -->
    <div class="passwordBox">

        <input
            type="password"
            id="password"
            class="rectangle"
            placeholder="Password"
        />

        <button type="button" id="toggle">
            <img
                class="element"
                src="../images/closed_eye.png"
                alt="Closed Eye Icon"
            />
        </button>
    </div>

    <!-- FORGOT PASSWORD -->
    <a href="#" id="forgotPassword" class="forgotPassword">
        Forgot Password?
    </a>

    <!-- SIGN IN BUTTON -->
    <button type="button" class="button">
        <span id="submit" class="sign_in">
            Sign In
        </span>
    </button>

    <div class="line"></div>

<!-- FORGOT PASSWORD BUTTON -->
    <button type="button" class="button">
        <span id="submit" class="sign_in">
            Forgot Password
        </span>
    </button>

    <div class="line"></div>
    
</html>
