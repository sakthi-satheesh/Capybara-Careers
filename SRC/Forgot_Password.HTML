<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <meta charset="utf-8" />
    <title>Forgot Password</title>

    <link rel="stylesheet" href="Forgot_Password.css">
    <script src="Forgot_Password.js" defer></script>
</head>

<body>

<div class="desktop-login">

    <!-- TITLE -->
    <div class="log_in">Forgot Password</div>

    <!-- EMAIL INPUT -->
    <div class="emailBox">
        <input
            type="email"
            id="email"
            class="rectangle"
            placeholder="Enter your email"
        />
    </div>

    <!-- SEND BUTTON -->
    <button type="button" class="button" id="sendReset">
        Send Reset Link
    </button>

    <!-- STATUS MESSAGE -->
    <div id="statusMessage" class="statusMessage"></div>

    <!-- BACK BUTTON -->
    <a href="Sign_In.html" class="backButton">
        &lt;-
    </a>

</div>

</body>
</html>
