<html>

<head>
<meta charset="UTF-8">
<title>Profile</title>

<style>
    body {
        font-family: Arial, sans-serif;
        margin: 0;
        background-color: #f5f5f5;
    }

    header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px;
        background-color: #ddd;
    }

    header img {
        height: 40px;
    }

    .HeaderButton button {
        margin-left: 5px;
    }

    /* Profile Banner */
    #profileBanner {
        background-color: #c9bfa6;
        text-align: center;
        padding: 15px;
        font-size: 28px;
        font-weight: bold;
        position: relative;
    }

    #editBtn {
        position: absolute;
        right: 15px;
        top: 15px;
        font-size: 12px;
    }

    /* Profile Section */
    #profileContainer {
        padding: 30px;
    }

    #profilePic {
        width: 120px;
        height: 120px;
        border-radius: 50%;
        background-color: #ccc;
        display: block;
        margin-bottom: 20px;
    }

    #infoBox {
        width: 350px;
        background-color: #e6e6e6;
        padding: 20px;
        border: 1px solid #ccc;
    }

    .infoRow {
        margin-bottom: 20px;
    }

    .label {
        font-weight: bold;
        margin-bottom: 5px;
    }

    footer {
        background-color: #ddd;
        padding: 15px;
        margin-top: 40px;
        text-align: center;
    }
</style>

</head>

<body>

<header>
    <img src="../images/UserImage.jpg" alt="UserImage" />
    <div class="HeaderButton">
        <button>Resources</button>
        <button>Events</button>
        <button>Directory</button>
        <button>Log out</button>
    </div>
</header>

<!-- Profile Banner -->
<div id="profileBanner">
    Profile
    <button id="editBtn">edit</button>
</div>

<!-- Profile Content -->
<div id="profileContainer">
    
    <img id="profilePic" src="../images/UserImage.jpg" alt="Profile Picture">

    <div id="infoBox">
        <div class="infoRow">
            <div class="label">Name:</div>
            <div>Your Name</div>
        </div>

        <div class="infoRow">
            <div class="label">Email:</div>
            <div>student@csus.edu</div>
        </div>

        <div class="infoRow">
            <div class="label">Bio:</div>
            <div>Write something about yourself here</div>
        </div>

        <div class="infoRow">
            <div class="label">Portfolio:</div>
            <div>your portfolio link</div>
        </div>
    </div>

</div>

</body>
