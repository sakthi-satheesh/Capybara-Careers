<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" href="Profile.css">
    <meta charset="UTF-8">
    <title>Profile</title>
    <script src="Profile.js" defer></script>
</head>

<body>

<a href="javascript:history.back()" class="backButton">&lt;-</a>

<nav class="profile-nav">
    <a href="Resources.html">Resources</a>
    <a href="Events.html">Events</a>
    <a href="Directory.html">Directory</a>
</nav>

<div class="profile-page">

    <div class="profile-header">
        <img src="../images/capybaralogo.png" alt="Capybara Logo">
        <h1>Profile</h1>
    </div>

    <div class="profile-card">
        <img class="profile-image" src="../images/UserImage.jpg" alt="User Profile">

        <div class="profile-info">
            <h2 id="studentName">Your Name</h2>
            <p>Computer Science Student</p>
            <p>California State University, Sacramento</p>
        </div>

        <button class="edit-button">edit</button>
    </div>

    <div class="profile-content">

        <section class="main-info card">
            <h2>Student Information</h2>

            <p><strong>Name:</strong> <span id="profileName">Your Name</span></p>
            <p><strong>Email:</strong> <span id="profileEmail">student@csus.edu</span></p>
            <p><strong>Bio:</strong></p>
            <p class="empty-space"></p>
            <p><strong>Portfolio:</strong></p>
        </section>

        <section class="side-info card">
            <h2>Skills</h2>

            <div class="skills">
                <span>Microsoft Excel</span>
                <span>Data Analysis</span>
                <span>HTML</span>
                <span>CSS</span>
                <span>Teamwork</span>
            </div>
        </section>

    </div>

</div>


</body>
</html>
