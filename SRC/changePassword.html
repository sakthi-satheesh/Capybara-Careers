<!DOCTYPE html>

<html>
<head>
    <meta charset="utf-8" />
    <title>Change Password</title>
    <link rel="stylesheet" href="changePassword.css">
    <script src="changePassword.js" defer></script>
</head>
<body>

<div class="change_password" >

    <div class="changePassword" >Change Password</div>

    <div class="box" >

        <div class="text">Enter in new password below</div>

        <div class="passwordBox">
            <input type="password" id="password" class="rectangle" placeholder="Password"/>

            <button type="button" id="toggle">
                <img class="element"
                     src="../images/closed_eye.png"
                     alt="Closed Eye Icon"/>
            </button>
        </div>

        <div class="confirm_passwordBox">
            <input type="password"
                   id="confirmPassword"
                   class="rectangle"
                   placeholder="Confirm Password"/>

            <button type="button" id="toggle2">
                <img class="element"
                     src="../images/closed_eye.png"
                     alt="Closed Eye Icon"/>
            </button>
        </div>

        <button type="button" class="button">
            <a id="submitButton" class="submit">Change Password</a>
        </button>
    </div>

    <a href="javascript:history.back()" class="backButton" >&lt;-</a>

</div>

</body>
</html>
