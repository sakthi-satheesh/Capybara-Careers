<!DOCTYPE html>

<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="Sign_Up.css">
</head>
<body>

<div class="sign-up" >
    <div class="create_acct" >Create your Account</div>

    <div class="firstName" >
        <input type="text" class="rectangle" placeholder="First Name"/>
    </div>

    <div class="lastName" >
        <input type="text" class="rectangle" placeholder="Last Name"/>
    </div>

    <div class="emailBox" >
        <input type="text" class="rectangle" placeholder="Email"/>
    </div>

    <div class="passwordBox" >
        <input type="text" class="rectangle" placeholder="Password"/>
        <img class="element" src="../images/closed_eye.png" alt="Closed Eye Icon"/>
    </div>

    <div class="confirm_passwordBox" >
        <input type="text" class="rectangle" placeholder="Confirm Password"/>
        <img class="element" src="../images/closed_eye.png" alt="Closed Eye Icon"/>
    </div>

    <button class="button" >
        <a href="#" class="sign_up">Sign Up</a>
    </button>

    <div class="line" ></div>
    <div class="sign_up_with" >Or sign up with</div>

    <div class="social" >
        <div class="ellipse" ></div>
        <img class="google" src="../images/google_logo.png" alt="Google Logo"/>
        <div class="ellipse-2" ></div>
        <img class="facebook" src="../images/facebook_logo.png" alt="Facebook Logo"/>
        <div class="ellipse-3" ></div>
        <img class="twitter" src="../images/twitter_logo.png" alt="Twitter Logo"/>
        <a href="#" class="yes_account">Already have an account? Sign In</a>
    </div>

    <div class="backButton" >&lt;-</div>
</div>

</body>
</html>
